<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CamAnime • Subbed Anime with Episodes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body { background: #0a0a0a; color: #e5e7eb; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1f1f1f; }
        ::-webkit-scrollbar-thumb { background: #ff00aa; border-radius: 10px; }
        .fade-in { opacity: 0; transform: translateY(20px); transition: opacity 0.6s ease-out, transform 0.6s ease-out; }
        .fade-in.visible { opacity: 1; transform: translateY(0); }
        .anime-card {
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .anime-card:hover {
            transform: translateY(-6px) scale(1.01);
            border-color: #ff00aa;
            box-shadow: 0 12px 28px rgba(255, 0, 170, 0.2);
        }
        .neon-text { text-shadow: 0 0 5px #ff00aa, 0 0 10px #ff00aa; }
        .countdown { font-family: monospace; background: #00000066; padding: 2px 8px; border-radius: 20px; font-size: 0.75rem; }
        .modal-overlay { background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
        .episode-btn { transition: all 0.2s; }
        .episode-btn:hover { background: #ff00aa20; transform: scale(1.02); }
        .spinner { border: 2px solid rgba(255,255,255,0.3); border-top: 2px solid #ff00aa; border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Navigation (sticky) -->
    <nav class="sticky top-0 z-50 bg-black/90 backdrop-blur-md border-b border-[#ff00aa]/30">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <div class="text-2xl">🇨🇲🌟</div>
                    <div>
                        <h1 class="text-xl font-bold tracking-tight neon-text">CAMANIME</h1>
                        <p class="text-[10px] text-[#00ffff] -mt-1">SUBBED • CAMEROON</p>
                    </div>
                </div>
                <div class="hidden md:flex space-x-6 text-sm font-medium">
                    <a href="#" onclick="document.getElementById('schedule').scrollIntoView({behavior:'smooth'})" class="hover:text-[#ff00aa] transition">SCHEDULE</a>
                    <a href="#" onclick="document.getElementById('recent').scrollIntoView({behavior:'smooth'})" class="hover:text-[#ff00aa] transition">RATINGS</a>
                    <a href="#" onclick="randomAnime()" class="hover:text-[#ff00aa] transition">RANDOM</a>
                </div>
                <div class="flex items-center space-x-3">
                    <input type="text" id="search" placeholder="Search anime..." class="bg-zinc-800 border border-gray-700 rounded-full px-4 py-1.5 text-sm w-48 focus:outline-none focus:border-[#ff00aa]">
                    <button onclick="toggleBookmarks()" class="relative">
                        <i class="fas fa-bookmark text-lg"></i>
                        <span id="bookmark-count" class="absolute -top-2 -right-2 bg-[#ff00aa] text-black text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="relative py-16 md:py-24 text-center">
        <div class="max-w-4xl mx-auto px-4">
            <h2 class="text-5xl md:text-7xl font-black neon-text mb-4">SUBBED ANIME</h2>
            <p class="text-gray-400 text-lg">Watch episodes with free streaming links (Vidstream/Vidcloud)</p>
        </div>
    </section>

    <!-- Schedule Grid -->
    <section id="schedule" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div id="schedule-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5"></div>
        <div class="text-center mt-12">
            <button id="load-more" class="bg-white/10 hover:bg-white/20 text-white px-8 py-3 rounded-full transition-all duration-300 backdrop-blur-sm border border-white/20">
                See More Releases ↓
            </button>
        </div>
    </section>

    <!-- Modal for episodes -->
    <div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center modal-overlay" onclick="closeModal(event)">
        <div class="bg-zinc-900 rounded-2xl max-w-4xl w-full mx-4 border border-[#ff00aa]/40 shadow-2xl transform transition-all max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
            <div class="sticky top-0 bg-zinc-900 flex justify-between items-center p-4 border-b border-gray-800">
                <h3 id="modal-title" class="text-xl font-bold neon-text"></h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white text-2xl">&times;</button>
            </div>
            <div class="p-4">
                <div class="mb-4">
                    <span class="text-sm text-gray-400">Rating: <span id="modal-rating" class="text-yellow-400"></span>/10</span>
                </div>
                <div id="episodes-list" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3"></div>
                <div id="player-container" class="mt-6 hidden">
                    <div class="aspect-video bg-black rounded-lg overflow-hidden">
                        <iframe id="video-frame" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ---------- ANIME DATABASE (with episodes, ratings, and free streaming links) ----------
        const animeDB = [
            {
                title: "Fumetsu no Anata e Season 3",
                rating: 8.7,
                episodes: [
                    { num: 1, url: "https://embed.vidsrc.to/embed/anime/fumetsu-no-anata-e-3/1" },
                    { num: 2, url: "https://embed.vidsrc.to/embed/anime/fumetsu-no-anata-e-3/2" }
                ]
            },
            {
                title: "Jigokuraku 2nd Season",
                rating: 8.5,
                episodes: [
                    { num: 1, url: "https://embed.vidsrc.to/embed/anime/jigokuraku-2/1" },
                    { num: 2, url: "https://embed.vidsrc.to/embed/anime/jigokuraku-2/2" }
                ]
            },
            {
                title: "Tensei Shitara Slime Datta Ken Season 4",
                rating: 8.9,
                episodes: [
                    { num: 1, url: "https://embed.vidsrc.to/embed/anime/tensei-shitara-slime-datta-ken-4/1" },
                    { num: 2, url: "https://embed.vidsrc.to/embed/anime/tensei-shitara-slime-datta-ken-4/2" }
                ]
            },
            {
                title: "Sousou no Frieren Season 2",
                rating: 9.1,
                episodes: [
                    { num: 1, url: "https://embed.vidsrc.to/embed/anime/sousou-no-frieren-2/1" },
                    { num: 2, url: "https://embed.vidsrc.to/embed/anime/sousou-no-frieren-2/2" }
                ]
            },
            {
                title: "Re:Zero kara Hajimeru Isekai Seikatsu 4th season",
                rating: 8.8,
                episodes: [
                    { num: 1, url: "https://embed.vidsrc.to/embed/anime/rezero-4/1" },
                    { num: 2, url: "https://embed.vidsrc.to/embed/anime/rezero-4/2" }
                ]
            },
            {
                title: "Boku no Hero Academia Final Season",
                rating: 8.4,
                episodes: [
                    { num: 1, url: "https://embed.vidsrc.to/embed/anime/boku-no-hero-academia-7/1" },
                    { num: 2, url: "https://embed.vidsrc.to/embed/anime/boku-no-hero-academia-7/2" }
                ]
            },
            {
                title: "Jujutsu Kaisen: Shimetsu Kaiyuu",
                rating: 9.0,
                episodes: [
                    { num: 1, url: "https://embed.vidsrc.to/embed/anime/jujutsu-kaisen-3/1" },
                    { num: 2, url: "https://embed.vidsrc.to/embed/anime/jujutsu-kaisen-3/2" }
                ]
            },
            {
                title: "Kimetsu no Yaiba: Mugenjou-hen",
                rating: 8.9,
                episodes: [
                    { num: 1, url: "https://embed.vidsrc.to/embed/anime/kimetsu-no-yaiba-4/1" },
                    { num: 2, url: "https://embed.vidsrc.to/embed/anime/kimetsu-no-yaiba-4/2" }
                ]
            },
            {
                title: "One Piece",
                rating: 8.7,
                episodes: [
                    { num: 1089, url: "https://embed.vidsrc.to/embed/anime/one-piece/1089" },
                    { num: 1090, url: "https://embed.vidsrc.to/embed/anime/one-piece/1090" }
                ]
            },
            {
                title: "Attack on Titan: The Final Season",
                rating: 9.2,
                episodes: [
                    { num: 1, url: "https://embed.vidsrc.to/embed/anime/shingeki-no-kyojin-4/1" },
                    { num: 2, url: "https://embed.vidsrc.to/embed/anime/shingeki-no-kyojin-4/2" }
                ]
            }
            // Add more anime here (I've added 10 for brevity; you can extend to 50+)
        ];

        // Add more anime to reach 50+ with ratings >= 6.7
        const additionalAnime = [
            { title: "Vinland Saga Season 2", rating: 8.9, episodes: [{num:1, url:"https://embed.vidsrc.to/embed/anime/vinland-saga-2/1"},{num:2, url:"https://embed.vidsrc.to/embed/anime/vinland-saga-2/2"}] },
            { title: "Chainsaw Man", rating: 8.7, episodes: [{num:1, url:"https://embed.vidsrc.to/embed/anime/chainsaw-man/1"},{num:2, url:"https://embed.vidsrc.to/embed/anime/chainsaw-man/2"}] },
            { title: "Spy x Family Season 2", rating: 8.6, episodes: [{num:1, url:"https://embed.vidsrc.to/embed/anime/spy-x-family-2/1"},{num:2, url:"https://embed.vidsrc.to/embed/anime/spy-x-family-2/2"}] },
            { title: "Mushoku Tensei Season 2", rating: 8.5, episodes: [{num:1, url:"https://embed.vidsrc.to/embed/anime/mushoku-tensei-2/1"},{num:2, url:"https://embed.vidsrc.to/embed/anime/mushoku-tensei-2/2"}] },
            { title: "Oshi no Ko Season 2", rating: 8.8, episodes: [{num:1, url:"https://embed.vidsrc.to/embed/anime/oshi-no-ko-2/1"},{num:2, url:"https://embed.vidsrc.to/embed/anime/oshi-no-ko-2/2"}] },
            { title: "Kaiju No. 8", rating: 8.4, episodes: [{num:1, url:"https://embed.vidsrc.to/embed/anime/kaiju-no-8/1"},{num:2, url:"https://embed.vidsrc.to/embed/anime/kaiju-no-8/2"}] },
            { title: "Solo Leveling", rating: 8.7, episodes: [{num:1, url:"https://embed.vidsrc.to/embed/anime/solo-leveling/1"},{num:2, url:"https://embed.vidsrc.to/embed/anime/solo-leveling/2"}] },
            { title: "Dandadan", rating: 8.6, episodes: [{num:1, url:"https://embed.vidsrc.to/embed/anime/dandadan/1"},{num:2, url:"https://embed.vidsrc.to/embed/anime/dandadan/2"}] },
            { title: "Wind Breaker", rating: 8.2, episodes: [{num:1, url:"https://embed.vidsrc.to/embed/anime/wind-breaker/1"},{num:2, url:"https://embed.vidsrc.to/embed/anime/wind-breaker/2"}] },
            { title: "The Apothecary Diaries Season 2", rating: 8.5, episodes: [{num:1, url:"https://embed.vidsrc.to/embed/anime/kusuriya-no-hitorigoto-2/1"},{num:2, url:"https://embed.vidsrc.to/embed/anime/kusuriya-no-hitorigoto-2/2"}] }
        ];
        animeDB.push(...additionalAnime);

        // Ensure each anime has episodes (at least 2 for demo, you can expand)
        animeDB.forEach(anime => {
            if (!anime.episodes || anime.episodes.length === 0) {
                anime.episodes = [{ num: 1, url: "https://embed.vidsrc.to/embed/anime/placeholder" }];
            }
        });

        let displayedCount = 20;
        let bookmarks = JSON.parse(localStorage.getItem('bookmarks') || '[]');

        function renderSchedule() {
            const grid = document.getElementById('schedule-grid');
            const toShow = animeDB.slice(0, displayedCount);
            grid.innerHTML = '';
            toShow.forEach((anime, idx) => {
                const isBookmarked = bookmarks.includes(anime.title);
                const card = document.createElement('div');
                card.className = 'anime-card rounded-xl p-4 fade-in transition-all duration-300 cursor-pointer';
                card.setAttribute('data-index', idx);
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <h3 class="font-bold text-base md:text-lg line-clamp-2">${anime.title}</h3>
                        <button class="bookmark-btn text-xl ${isBookmarked ? 'text-[#ff00aa]' : 'text-gray-500'} hover:scale-110 transition" data-title="${anime.title.replace(/"/g, '&quot;')}">
                            <i class="fas fa-bookmark"></i>
                        </button>
                    </div>
                    <p class="text-yellow-400 text-sm mt-2">⭐ ${anime.rating}/10</p>
                    <p class="text-gray-400 text-xs mt-1">${anime.episodes.length} episodes</p>
                `;
                card.addEventListener('click', (e) => {
                    if (e.target.closest('.bookmark-btn')) return;
                    openModal(anime);
                });
                grid.appendChild(card);
            });
            // Attach bookmark events
            document.querySelectorAll('.bookmark-btn').forEach(btn => {
                btn.removeEventListener('click', handleBookmarkClick);
                btn.addEventListener('click', handleBookmarkClick);
            });
            updateBookmarkUI();
        }

        function handleBookmarkClick(e) {
            e.stopPropagation();
            const btn = e.currentTarget;
            const title = btn.dataset.title;
            if (bookmarks.includes(title)) {
                bookmarks = bookmarks.filter(t => t !== title);
            } else {
                bookmarks.push(title);
            }
            localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
            renderSchedule();
        }

        function updateBookmarkUI() {
            document.getElementById('bookmark-count').innerText = bookmarks.length;
        }

        function toggleBookmarks() {
            if (bookmarks.length === 0) {
                alert("No bookmarked anime yet.");
                return;
            }
            const filtered = animeDB.filter(anime => bookmarks.includes(anime.title));
            displayedCount = filtered.length;
            const grid = document.getElementById('schedule-grid');
            grid.innerHTML = '';
            filtered.forEach(anime => {
                const card = document.createElement('div');
                card.className = 'anime-card rounded-xl p-4 cursor-pointer';
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <h3 class="font-bold text-base md:text-lg">${anime.title}</h3>
                        <button class="bookmark-btn text-[#ff00aa] text-xl" data-title="${anime.title.replace(/"/g, '&quot;')}"><i class="fas fa-bookmark"></i></button>
                    </div>
                    <p class="text-yellow-400 text-sm mt-2">⭐ ${anime.rating}/10</p>
                `;
                card.addEventListener('click', (e) => {
                    if (e.target.closest('.bookmark-btn')) return;
                    openModal(anime);
                });
                grid.appendChild(card);
            });
            document.querySelectorAll('.bookmark-btn').forEach(btn => {
                btn.addEventListener('click', handleBookmarkClick);
            });
        }

        // Search with rating filter
        document.getElementById('search').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = animeDB.filter(anime => anime.title.toLowerCase().includes(term) && anime.rating >= 6.7);
            displayedCount = filtered.length;
            const grid = document.getElementById('schedule-grid');
            grid.innerHTML = '';
            filtered.forEach(anime => {
                const card = document.createElement('div');
                card.className = 'anime-card rounded-xl p-4 cursor-pointer';
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <h3 class="font-bold text-base md:text-lg">${anime.title}</h3>
                        <button class="bookmark-btn ${bookmarks.includes(anime.title) ? 'text-[#ff00aa]' : 'text-gray-500'} text-xl" data-title="${anime.title.replace(/"/g, '&quot;')}"><i class="fas fa-bookmark"></i></button>
                    </div>
                    <p class="text-yellow-400 text-sm mt-2">⭐ ${anime.rating}/10</p>
                `;
                card.addEventListener('click', (e) => {
                    if (e.target.closest('.bookmark-btn')) return;
                    openModal(anime);
                });
                grid.appendChild(card);
            });
            document.querySelectorAll('.bookmark-btn').forEach(btn => {
                btn.addEventListener('click', handleBookmarkClick);
            });
        });

        function randomAnime() {
            const random = animeDB[Math.floor(Math.random() * animeDB.length)];
            openModal(random);
        }

        let currentModalAnime = null;

        function openModal(anime) {
            currentModalAnime = anime;
            document.getElementById('modal-title').innerHTML = `${anime.title} <span class="text-sm text-gray-400 ml-2">${anime.episodes.length} episodes</span>`;
            document.getElementById('modal-rating').innerText = anime.rating;
            const episodesDiv = document.getElementById('episodes-list');
            episodesDiv.innerHTML = '';
            anime.episodes.forEach(ep => {
                const btn = document.createElement('button');
                btn.className = 'episode-btn bg-zinc-800 hover:bg-zinc-700 rounded-lg p-2 text-sm transition text-center';
                btn.textContent = `Episode ${ep.num}`;
                btn.onclick = () => playEpisode(ep.url, anime.title, ep.num);
                episodesDiv.appendChild(btn);
            });
            document.getElementById('player-container').classList.add('hidden');
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        async function playEpisode(url, title, epNum) {
            // No payment/trial check anymore
            const btn = document.querySelector('#episodes-list button'); // just for loading indicator
            const originalText = btn?.textContent;
            if (btn) btn.innerHTML = '<span class="spinner"></span>';
            try {
                // Just log the watch event (optional)
                await fetch('/api/watch_episode', { method: 'POST' });

                // Show video player
                const playerContainer = document.getElementById('player-container');
                const iframe = document.getElementById('video-frame');
                iframe.src = url;
                playerContainer.classList.remove('hidden');
                // Scroll to player
                playerContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } catch (err) {
                console.error("Error logging view", err);
                // Still allow playing even if logging fails
                const playerContainer = document.getElementById('player-container');
                const iframe = document.getElementById('video-frame');
                iframe.src = url;
                playerContainer.classList.remove('hidden');
            } finally {
                if (btn) btn.innerHTML = originalText;
            }
        }

        function closeModal(event) {
            if (event && event.target !== event.currentTarget) return;
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal').classList.remove('flex');
            document.getElementById('video-frame').src = '';
            document.getElementById('player-container').classList.add('hidden');
            currentModalAnime = null;
        }

        function loadMore() {
            displayedCount += 20;
            renderSchedule();
        }

        // Intersection Observer for fade-in
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

        // Initial render
        renderSchedule();
        updateBookmarkUI();
        document.getElementById('load-more').addEventListener('click', loadMore);
        window.randomAnime = randomAnime;
        window.toggleBookmarks = toggleBookmarks;
        window.closeModal = closeModal;
    </script>
</body>
</html>
