<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Active | Camanime</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0a0c15; color: #eef2ff; line-height: 1.5; min-height: 100vh; display: flex; flex-direction: column; }

        header { background: rgba(10, 12, 21, 0.95); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(255, 180, 71, 0.2); width: 100%; padding: 0.8rem 1.5rem; }
        .site-title { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #FFB347, #FF6B6B); -webkit-background-clip: text; color: transparent; text-decoration: none; }

        .container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .success-card { background: linear-gradient(145deg, #11151f, #0c0f18); border-radius: 1.5rem; padding: 4rem 2rem; border: 1px solid rgba(255, 180, 71, 0.3); text-align: center; max-width: 600px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        .icon-circle { width: 100px; height: 100px; background: rgba(255, 179, 71, 0.1); border: 3px solid #FFB347; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem; color: #FFB347; font-size: 3rem; animation: pulse 2s infinite; }
        
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 179, 71, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(255, 179, 71, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 179, 71, 0); }
        }

        h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 1rem; color: #eef2ff; }
        p { color: #b9c3e6; font-size: 1.2rem; margin-bottom: 2.5rem; }
        
        .btn-primary { background: #FFB347; color: #0a0c15; padding: 1rem 2rem; border-radius: 30px; text-decoration: none; font-weight: 700; font-size: 1.1rem; transition: 0.2s; display: inline-flex; align-items: center; gap: 0.8rem; }
        .btn-primary:hover { background: #ffa01e; transform: scale(1.05); }

        footer { padding: 2rem; border-top: 1px solid rgba(255,255,255,0.05); text-align: center; font-size: 0.8rem; color: #6f7aa3; }
    </style>
</head>
<body>

<header>
    <a href="/" class="site-title">Camanime</a>
</header>

<div class="container">
    <div class="success-card">
        <div class="icon-circle">
            <i class="fas fa-check"></i>
        </div>
        <h1>Subscription Active! 🇨🇲🔥</h1>
        <p>Unlimited subbed anime unlocked. Your account has been upgraded successfully.</p>
        <a href="/" class="btn-primary">
            <i class="fas fa-home"></i> Back to CamAnime
        </a>
    </div>
</div>

<footer>
    <p>Camanime Demo - All videos are simulated dummy files.</p>
</footer>

</body>
</html>
