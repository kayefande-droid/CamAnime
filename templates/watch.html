<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch {{ anime.title }} | Camanime</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0a0c15; color: #eef2ff; line-height: 1.5; }

        header { background: rgba(10, 12, 21, 0.95); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(255, 180, 71, 0.2); position: sticky; top: 0; z-index: 1000; padding: 0.8rem 1.5rem; }
        .site-title { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #FFB347, #FF6B6B); -webkit-background-clip: text; color: transparent; text-decoration: none; }

        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }

        .video-wrapper {
            position: relative; width: 100%; aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; }

        .controls { display: flex; justify-content: space-between; align-items: center; background: #1e263a; padding: 1rem; border-radius: 12px; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .ep-badge { background: #FFB347; color: #0a0c15; padding: 0.2rem 0.6rem; border-radius: 4px; font-weight: 700; font-size: 0.9rem; margin-right: 0.5rem; }

        .nav-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            transition: 0.2s;
            font-size: 0.9rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
        }
        .nav-btn:hover { background: #FFB347; color: #0a0c15; }
        .nav-btn.disabled { opacity: 0.5; pointer-events: none; }

        .info { margin-bottom: 2rem; }
    </style>
</head>
<body>

<header>
    <div style="max-width: 1400px; margin: 0 auto;">
        <a href="/" class="site-title">Camanime</a>
    </div>
</header>

<div class="container">
    <div class="video-wrapper">
        <iframe src="{{ stream_url }}" allowfullscreen></iframe>
    </div>

    <div class="controls">
        <a href="{{ '/watch/' ~ anime.id ~ '/' ~ prev_ep.id if prev_ep else '#' }}" class="nav-btn {{ 'disabled' if not prev_ep else '' }}">
            <i class="fas fa-chevron-left"></i> Prev
        </a>

        <div style="text-align: center;">
            <span class="ep-badge">{{ ep_num }}</span>
            <span style="font-weight: bold;">{{ anime.title }}</span>
        </div>

        <a href="{{ '/watch/' ~ anime.id ~ '/' ~ next_ep.id if next_ep else '#' }}" class="nav-btn {{ 'disabled' if not next_ep else '' }}">
            Next <i class="fas fa-chevron-right"></i>
        </a>
    </div>

    <div class="info">
         <a href="/anime/{{ anime.id }}" class="nav-btn"><i class="fas fa-list"></i> View All Episodes</a>
    </div>
</div>

</body>
</html>
