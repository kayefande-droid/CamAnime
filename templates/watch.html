<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch {{ anime.title.english or anime.title.romaji }} EP {{ ep_num }} | Camanime</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0a0c15; color: #eef2ff; line-height: 1.5; }

        header { background: rgba(10, 12, 21, 0.95); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(255, 180, 71, 0.2); position: sticky; top: 0; z-index: 1000; padding: 0.8rem 1.5rem; }
        .site-title { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #FFB347, #FF6B6B); -webkit-background-clip: text; color: transparent; text-decoration: none; }

        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }

        /* Video Container */
        .video-wrapper {
            position: relative; width: 100%; aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Native Video Player */
        video { width: 100%; height: 100%; object-fit: contain; }

        /* Fallback Iframe */
        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; }

        .controls { display: flex; justify-content: space-between; align-items: center; background: #1e263a; padding: 1rem; border-radius: 12px; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .ep-badge { background: #FFB347; color: #0a0c15; padding: 0.2rem 0.6rem; border-radius: 4px; font-weight: 700; font-size: 0.9rem; margin-right: 0.5rem; }

        .nav-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            transition: 0.2s;
            font-size: 0.9rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
        }
        .nav-btn:hover { background: #FFB347; color: #0a0c15; }
        .nav-btn.disabled { opacity: 0.5; pointer-events: none; }

        .btn-dl { background: #FFB347; color: #000; font-weight: bold; border: none; cursor: pointer; }

        .info { margin-bottom: 2rem; }

        /* Server Switcher */
        .server-select { display: flex; gap: 0.5rem; margin-top: 1rem; }
        .server-btn { background: #333; color: white; border: 1px solid #555; padding: 0.3rem 0.8rem; cursor: pointer; border-radius: 4px; }
        .server-btn.active { background: #FFB347; color: black; border-color: #FFB347; }
    </style>
</head>
<body>

<header>
    <div style="max-width: 1400px; margin: 0 auto;">
        <a href="/" class="site-title">Camanime</a>
    </div>
</header>

<div class="container">
    <div class="video-wrapper" id="videoContainer">
        {% if stream_url %}
            <!-- Primary Player (HLS) -->
            <video id="videoPlayer" controls poster="{{ anime.bannerImage }}">
                Your browser does not support the video tag.
            </video>
        {% else %}
            <!-- Fallback Embed immediately if API failed -->
            <iframe src="{{ backup_embed }}" allowfullscreen></iframe>
        {% endif %}
    </div>

    <!-- Server Controls -->
    <div class="server-select">
        <button class="server-btn active" onclick="switchSource('native')">Fast Server (Native)</button>
        <button class="server-btn" onclick="switchSource('embed')">Backup Server (Embed)</button>
    </div>

    <div class="controls">
        <a href="{{ '/watch/' ~ anime.id ~ '/' ~ prev_ep if prev_ep else '#' }}" class="nav-btn {{ 'disabled' if not prev_ep else '' }}">
            <i class="fas fa-chevron-left"></i> Prev
        </a>

        <div style="text-align: center;">
            <span class="ep-badge">EP {{ ep_num }}</span>
            <span style="font-weight: bold;">{{ anime.title.english or anime.title.romaji }}</span>
        </div>

        <a href="{{ '/watch/' ~ anime.id ~ '/' ~ next_ep if next_ep else '#' }}" class="nav-btn {{ 'disabled' if not next_ep else '' }}">
            Next <i class="fas fa-chevron-right"></i>
        </a>
    </div>

    <div class="info">
         <button class="nav-btn btn-dl" onclick="downloadVideo()"><i class="fas fa-download"></i> Download Episode</button>
         <a href="/anime/{{ anime.id }}" class="nav-btn"><i class="fas fa-list"></i> View All Episodes</a>
    </div>
</div>

<script>
    var video = document.getElementById('videoPlayer');
    var streamUrl = "{{ stream_url }}";
    var backupUrl = "{{ backup_embed }}";
    var container = document.getElementById('videoContainer');

    // Initialize HLS Player if stream URL exists
    if (streamUrl && Hls.isSupported()) {
        var hls = new Hls();
        hls.loadSource(streamUrl);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function() {
            // video.play();
        });

        // Handle Errors - fallback to embed
        hls.on(Hls.Events.ERROR, function (event, data) {
            if (data.fatal) {
                console.log("HLS Error, switching to backup...");
                switchSource('embed');
            }
        });
    } else if (streamUrl && video.canPlayType('application/vnd.apple.mpegurl')) {
        // Native HLS support (Safari)
        video.src = streamUrl;
    } else if (!streamUrl) {
        // No stream URL found initially
        console.log("No direct stream found, using backup embed.");
    }

    function switchSource(type) {
        container.innerHTML = ''; // Clear container

        document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));

        if (type === 'native' && streamUrl) {
            // Re-create video element
            var newVideo = document.createElement('video');
            newVideo.id = 'videoPlayer';
            newVideo.controls = true;
            newVideo.style.width = '100%';
            newVideo.style.height = '100%';
            container.appendChild(newVideo);

            if (Hls.isSupported()) {
                var hls = new Hls();
                hls.loadSource(streamUrl);
                hls.attachMedia(newVideo);
            } else {
                newVideo.src = streamUrl;
            }
            document.querySelector("button[onclick=\"switchSource('native')\"]").classList.add('active');
        } else {
            // Switch to Iframe
            var iframe = document.createElement('iframe');
            iframe.src = backupUrl;
            iframe.allowFullscreen = true;
            container.appendChild(iframe);
            document.querySelector("button[onclick=\"switchSource('embed')\"]").classList.add('active');
        }
    }

    function downloadVideo() {
        if (streamUrl) {
            window.open(streamUrl, '_blank');
        } else {
            alert("Direct download not available for this source. Try using a video downloader extension on the Backup Server.");
        }
    }
</script>

</body>
</html>
