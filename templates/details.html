<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ anime.title }} - Camanime</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0a0c15; color: #eef2ff; line-height: 1.5; }

        header { background: rgba(10, 12, 21, 0.95); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(255, 180, 71, 0.2); position: sticky; top: 0; z-index: 1000; padding: 0.8rem 1.5rem; }
        .site-title { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #FFB347, #FF6B6B); -webkit-background-clip: text; color: transparent; text-decoration: none; }

        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }

        .anime-header { display: flex; gap: 2rem; margin-bottom: 3rem; background: rgba(255,255,255,0.05); padding: 2rem; border-radius: 20px; }
        .anime-poster { width: 300px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .anime-info { flex: 1; }
        .anime-title { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; color: #FFB347; line-height: 1.1; }
        .anime-meta { display: flex; gap: 1rem; color: #b9c3e6; margin-bottom: 1.5rem; font-size: 0.9rem; flex-wrap: wrap; }
        .tag { background: rgba(255, 255, 255, 0.1); padding: 0.2rem 0.6rem; border-radius: 4px; }
        .rating { color: #FFB347; font-weight: bold; }

        .desc { color: #cbd5e1; margin-bottom: 2rem; max-height: 150px; overflow-y: auto; line-height: 1.6; }

        .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 0.8rem; }
        .ep-btn {
            background: #1e263a;
            color: white;
            padding: 0.8rem;
            border-radius: 8px;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .ep-btn:hover { background: #FFB347; color: #0a0c15; border-color: #FFB347; transform: translateY(-3px); }

        .btn-action {
            display: inline-block;
            background: #FFB347;
            color: #000;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: bold;
            margin-right: 1rem;
            cursor: pointer;
            border: none;
        }

        @media (max-width: 768px) {
            .anime-header { flex-direction: column; align-items: center; text-align: center; padding: 1rem; }
            .anime-poster { width: 200px; }
            .anime-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<header>
    <div style="max-width: 1400px; margin: 0 auto;">
        <a href="/" class="site-title">Camanime</a>
    </div>
</header>

<div class="container">
    <div class="anime-header">
        <img src="{{ anime.image }}" class="anime-poster" alt="Poster">
        <div class="anime-info">
            <h1 class="anime-title">{{ anime.title }}</h1>
            <div class="anime-meta">
                <span class="tag">Anime</span>
                <span class="tag">{{ anime.episodes | length }} Eps</span>
            </div>

            <div class="desc" style="white-space: pre-line;">{{ anime.description | safe }}</div>

            <button class="btn-action" onclick="toggleBookmark()"><i class="fas fa-bookmark"></i> Bookmark</button>
        </div>
    </div>

    <h2 style="border-left: 5px solid #FFB347; padding-left: 10px; margin-bottom: 1.5rem;">Episodes</h2>
    <div class="ep-grid">
        {% for ep in anime.episodes %}
        <a href="/watch/{{ anime.id }}/{{ ep.id }}" class="ep-btn">
            EP {{ ep.num }}
        </a>
        {% endfor %}
    </div>
</div>

<script>
    function toggleBookmark() {
        alert("Added to Bookmarks! (Local Storage)");
    }
</script>

</body>
</html>
